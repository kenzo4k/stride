services:
  mongodb:
    image: mongo:6
    container_name: stride-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - stride-network

  recommender-service:
    build:
      context: ./server/recommender_service
    container_name: stride-recommender
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stride
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - stride-network

  dropout-service:
    build:
      context: ./server/dropout_service
    container_name: stride-dropout
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/stride
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    networks:
      - stride-network

  backend:
    build:
      context: ./server
    container_name: stride-backend
    environment:
      # Use local MongoDB container instead of Atlas for a fully local experience
      - MONGODB_URI=mongodb://mongodb:27017/stride
      - PORT=5000
      - RECOMMENDER_SERVICE_URL=http://recommender-service:8000
      - DROPOUT_SERVICE_URL=http://dropout-service:8001
      - ACCESS_TOKEN_SECRET=stride_jwt_secret_key_2024_secure
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - recommender-service
      - dropout-service
    networks:
      - stride-network

  frontend:
    build:
      context: .
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: stride-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stride-network

networks:
  stride-network:
    driver: bridge

volumes:
  mongo_data:
